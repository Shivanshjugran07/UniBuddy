<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UniBuddy — Signing in...</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0b14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(99,102,241,0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
    .brand span { background: linear-gradient(135deg, #6366f1, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p { color: rgba(255,255,255,0.4); font-size: 14px; }
  </style>
</head>
<body>
  <div class="brand">Uni<span>Buddy</span></div>
  <div class="spinner"></div>
  <p>Completing sign in...</p>

  <script>
    const SUPABASE_URL = "https://ognlrlguombhjbyocpss.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nbmxybGd1b21iaGpieW9jcHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTczMDgsImV4cCI6MjA5MDIzMzMwOH0.x6Mbo8d_-3osljcCPgo868dGKpaIa0E9LtxQ260ocQA";
    const API = "https://unibuddy-1.onrender.com/api";

    async function handleCallback() {
      // Get hash params from URL (Supabase returns access_token in hash)
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get("access_token");
      const refreshToken = params.get("refresh_token");

      if (!accessToken) {
        window.location.href = "login.html";
        return;
      }

      try {
        // Get user info from Supabase using the access token
        const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          headers: {
            "Authorization": `Bearer ${accessToken}`,
            "apikey": SUPABASE_ANON_KEY
          }
        });
        const supabaseUser = await userRes.json();

        // Send to your backend to get JWT + upsert user in your DB
        const res = await fetch(`${API}/auth/google-callback`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            supabase_access_token: accessToken,
            email: supabaseUser.email,
            name: supabaseUser.user_metadata?.full_name || supabaseUser.email.split("@")[0],
            avatar: supabaseUser.user_metadata?.avatar_url || null,
            supabase_id: supabaseUser.id
          })
        });

        const data = await res.json();

        if (data.token) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          // Redirect based on role
          const role = data.user.role;
          window.location.href = role === "mentor" ? "mentor-dashboard.html" : role === "admin" ? "admin.html" : "dashboard.html";
        } else {
          alert("Login failed: " + (data.message || "Unknown error"));
          window.location.href = "login.html";
        }
      } catch (err) {
        console.error(err);
        alert("Something went wrong. Please try again.");
        window.location.href = "login.html";
      }
    }

    handleCallback();
  </script>
</body>
</html>
